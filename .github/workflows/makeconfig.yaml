name: Generate build.config (Samsung A25ex kernel-5.15)

on:
  workflow_dispatch:
    inputs:
      product:
        description: "Product name for out/target/product/<product>/..."
        required: true
        default: "a25ex"
      kernel_dir:
        description: "Kernel source directory (contains scripts/gen_build_config.py)"
        required: true
        default: "kernel-5.15"
      clang_version:
        description: "AOSP Clang prebuilt version directory (e.g., r450784e)"
        required: true
        default: "r450784e"
      clang_branch:
        description: "AOSP branch/ref for Clang prebuilts (used for archive fetch)"
        required: true
        default: "android14-release"
      build_tools_branch:
        description: "AOSP branch/ref for kernel build-tools prebuilts"
        required: true
        default: "main"
      defconfig:
        description: "Kernel defconfig name"
        required: true
        default: "a25ex_00_defconfig"
      overlays:
        description: "Defconfig overlay fragments (passed as one string arg)"
        required: true
        default: "entry_level.config"
      mode:
        description: "gen_build_config.py mode (-m): user/userdebug/eng"
        required: true
        default: "user"

jobs:
  gen-build-config:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install minimal host deps
        shell: bash
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install -y --no-install-recommends \
            ca-certificates curl git \
            python3 python3-venv python3-setuptools \
            xz-utils unzip zip \
            file rsync
          python3 --version

      - name: Compute OUT_REL from product
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          PRODUCT="${{ inputs.product }}"
          OUT_REL="out/target/product/${PRODUCT}/obj/KERNEL_OBJ"
          echo "out_rel=${OUT_REL}" >> "$GITHUB_OUTPUT"
          echo "OUT_REL=${OUT_REL}" >> "$GITHUB_ENV"

      - name: Generate build.config (+ fragments) into OUT_REL
        shell: bash
        run: |
          set -euo pipefail

          KERNEL_DIR="${{ inputs.kernel_dir }}"
          mkdir -p "${OUT_REL}"

          pushd "${KERNEL_DIR}" >/dev/null
          python3 scripts/gen_build_config.py \
            --kernel-defconfig "${{ inputs.defconfig }}" \
            --kernel-defconfig-overlays "${{ inputs.overlays }}" \
            -m "${{ inputs.mode }}" \
            -o "../${OUT_REL}/build.config"
          popd >/dev/null

          echo "== Generated files in ${OUT_REL} =="
          ls -la "${OUT_REL}"
          echo
          echo "== build.config (first 160 lines) =="
          sed -n '1,160p' "${OUT_REL}/build.config"

      - name: Upload generated build.config + fragments
        uses: actions/upload-artifact@v4
        with:
          name: build-config-${{ inputs.product }}-${{ inputs.mode }}
          path: |
            ${{ steps.vars.outputs.out_rel }}/build.config
            ${{ steps.vars.outputs.out_rel }}/build.config.*
          if-no-files-found: error