name: Build Samsung Kernel (ravindu style)

on:
  workflow_dispatch:
    inputs:
      build_kernel_version:
        description: "BUILD_KERNEL_VERSION (used in output naming + localversion)"
        required: false
        default: "dev"

jobs:
  build:
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash

    env:
      # mirrors the script's defaulting behavior
      BUILD_KERNEL_VERSION: ${{ inputs.build_kernel_version }}

      # Constants from your script (keep in env for clarity)
      PRODUCT: a25ex
      OUT_DIR: out/target/product/a25ex/obj/KERNEL_OBJ
      KERNEL_DEFCONFIG: a25ex_00_defconfig
      KERNEL_DEFCONFIG_OVERLAYS: entry_level.config

      # Toolchain tarball URL used by install_requirements()
      SAMSUNG_NDK_TARBALL_URL: https://github.com/ravindu644/android_kernel_a166p/releases/download/toolchain/toolchain.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install requirements
        run: |
          set -euo pipefail
          sudo apt-get update
          # build.sh explicitly checks for rsync + curl; packaging needs zip/tar; build config generation needs python3
          sudo apt-get install -y --no-install-recommends \
            rsync curl zip tar python3 python3-distutils python3-setuptools \
            ca-certificates git

      - name: Clean up
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"
          rm -rf "$ROOT/dist" "$ROOT/out"
          if [[ -d "$ROOT/prebuilts_a166p" ]]; then
            git -C "$ROOT/prebuilts_a166p" clean -xdf || true
          fi
          mkdir -p "$ROOT/dist"

      - name: Ensure Samsung NDK/toolchain present (download + extract if missing)
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"

          # build.sh condition: if either kernel/prebuilts OR prebuilts missing, fetch toolchain.tar.gz
          if [[ ! -d "$ROOT/kernel/prebuilts" || ! -d "$ROOT/prebuilts" ]]; then
            echo "[INFO] Cloning Samsung's NDK..."
            curl -fL -o toolchain.tar.gz "$SAMSUNG_NDK_TARBALL_URL"
            tar -xf toolchain.tar.gz
            rm -f toolchain.tar.gz
          else
            echo "[INFO] Toolchain already present."
          fi

      - name: Write custom localversion defconfig
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"
          mkdir -p "$ROOT/custom_defconfigs"
          cat > "$ROOT/custom_defconfigs/version_defconfig" <<EOF
          CONFIG_LOCALVERSION_AUTO=n
          CONFIG_LOCALVERSION="-Ubuntu-LXC-Docker-ravindu644-${BUILD_KERNEL_VERSION}"
          EOF

      - name: Generate build.config (scripts/gen_build_config.py)
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"

          cd "$ROOT/kernel-5.15"
          python3 scripts/gen_build_config.py \
            --kernel-defconfig "$KERNEL_DEFCONFIG" \
            --kernel-defconfig-overlays "$KERNEL_DEFCONFIG_OVERLAYS" \
            -m user \
            -o "$ROOT/$OUT_DIR/build.config" \
            >/dev/null

      - name: Export build environment + build GKI kernel (kernel/build/build.sh)
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"

          # ----- export_common_build_env -----
          export ARCH=arm64
          export PLATFORM_VERSION=13
          export CROSS_COMPILE="aarch64-linux-gnu-"
          export CROSS_COMPILE_COMPAT="arm-linux-gnueabi-"
          export OUT_DIR="$ROOT/$OUT_DIR"
          export DIST_DIR="$ROOT/$OUT_DIR"
          export BUILD_CONFIG="$ROOT/$OUT_DIR/build.config"

          # ----- export_custom_build_env -----
          export MAKE_MENUCONFIG=0
          if [[ "$MAKE_MENUCONFIG" == "1" ]]; then
            export HERMETIC_TOOLCHAIN=0
          fi

          export MERGE_CONFIG="$ROOT/kernel-5.15/scripts/kconfig/merge_config.sh"

          # Collect realpaths as a space-separated list (as script does)
          if [[ -d "$ROOT/custom_defconfigs" ]]; then
            CUSTOM_DEFCONFIGS_LIST="$(find "$ROOT/custom_defconfigs" -maxdepth 1 -type f -exec realpath {} \; | tr '\n' ' ')"
          else
            CUSTOM_DEFCONFIGS_LIST=""
          fi
          export CUSTOM_DEFCONFIGS_LIST

          # GKI_KERNEL_BUILD_OPTIONS array
          GKI_KERNEL_BUILD_OPTIONS=(
            "SKIP_MRPROPER=1"
            "KMI_SYMBOL_LIST_STRICT_MODE=0"
            "ABI_DEFINITION="
            "BUILD_BOOT_IMG=1"
            "MKBOOTIMG_PATH=$ROOT/prebuilts_a166p/mkbootimg/mkbootimg.py"
            "KERNEL_BINARY=Image.gz"
            "BOOT_IMAGE_HEADER_VERSION=4"
            "SKIP_VENDOR_BOOT=1"
            "AVB_SIGN_BOOT_IMG=1"
            "AVB_BOOT_PARTITION_SIZE=67108864"
            "AVB_BOOT_KEY=$ROOT/prebuilts_a166p/mkbootimg/tests/data/testkey_rsa2048.pem"
            "AVB_BOOT_ALGORITHM=SHA256_RSA2048"
            "AVB_BOOT_PARTITION_NAME=boot"
          )
          export GKI_KERNEL_BUILD_OPTIONS

          # MKBOOTIMG_EXTRA_ARGS (from build.sh)
          export MKBOOTIMG_EXTRA_ARGS="\
          --os_version 13.0.0 \
          --os_patch_level 2025-07-00 \
          --pagesize 4096 \
          "

          # ----- build_gki_kernel (from build.sh) -----
          cd "$ROOT/kernel"
          env "${GKI_KERNEL_BUILD_OPTIONS[@]}" ./build/build.sh

          # Copy outputs to dist (match build.sh paths)
          cp "$ROOT/$OUT_DIR/kernel-5.15/arch/arm64/boot/Image"* \
             "$ROOT/$OUT_DIR/dist/boot.img" \
             "$ROOT/dist"

      - name: Build vendor_boot
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"
          SCRIPT_DIR="$ROOT" "$ROOT/prebuilts_a166p/scripts/build_vendor_boot.sh"

      - name: Build vendor_dlkm
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"
          SCRIPT_DIR="$ROOT" "$ROOT/prebuilts_a166p/scripts/build_vendor_dlkm.sh"

      - name: Package artifacts (tar + zip) (match build.sh)
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"
          cd "$ROOT/dist"

          TAR="SM-A253Z-Ubuntu-LXC-Docker-KernelSU-${BUILD_KERNEL_VERSION}.tar"
          ZIP="SM-A253Z-Ubuntu-LXC-Docker-KernelSU-${BUILD_KERNEL_VERSION}.zip"

          tar -cvf "$TAR" boot.img vendor_boot.img
          zip -9 -r "$ZIP" "$TAR" vendor_dlkm.img

          rm -f "$TAR" vendor_dlkm.img boot.img vendor_boot.img

          echo ""
          echo "[INFO] Kernel build completed successfully"
          ls -la

      - name: Upload dist/ as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SM-A253Z-Ubuntu-LXC-Docker-KernelSU-${{ inputs.build_kernel_version }}
          path: dist/*
          if-no-files-found: error
