name: Build Samsung A25ex kernel (generate build.config + build)

on:
  workflow_dispatch:
    inputs:
      product:
        description: "Product name for out/target/product/<product>/..."
        required: true
        default: "a25ex"
      kernel_dir:
        description: "Kernel source directory (contains scripts/gen_build_config.py)"
        required: true
        default: "kernel-5.15"
      defconfig:
        description: "Kernel defconfig name"
        required: true
        default: "a25ex_00_defconfig"
      overlays:
        description: "Defconfig overlay fragments (passed as one string arg)"
        required: true
        default: "entry_level.config"
      mode:
        description: "gen_build_config.py mode (-m): user/userdebug/eng"
        required: true
        default: "user"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies (Ubuntu 24.04)
        shell: bash
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install -y --no-install-recommends \
            build-essential \
            bc bison flex perl \
            python3 python3-setuptools \
            git rsync cpio zip unzip file \
            libssl-dev libelf-dev pkg-config \
            dwarves xz-utils zstd \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi
          python3 --version

      - name: Compute output paths
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          PRODUCT="${{ inputs.product }}"
          OUT_REL="out/target/product/${PRODUCT}/obj/KERNEL_OBJ"
          echo "out_rel=${OUT_REL}" >> "$GITHUB_OUTPUT"
          echo "OUT_REL=${OUT_REL}" >> "$GITHUB_ENV"
          echo "OUT_DIR=${OUT_REL}" >> "$GITHUB_ENV"
          echo "DIST_DIR=${OUT_REL}" >> "$GITHUB_ENV"
          echo "BUILD_CONFIG=${OUT_REL}/build.config" >> "$GITHUB_ENV"

      - name: Generate build.config (+ fragments)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OUT_REL}"

          pushd "${{ inputs.kernel_dir }}" >/dev/null
          python3 scripts/gen_build_config.py \
            --kernel-defconfig "${{ inputs.defconfig }}" \
            --kernel-defconfig-overlays "${{ inputs.overlays }}" \
            -m "${{ inputs.mode }}" \
            -o "../${OUT_REL}/build.config"
          popd >/dev/null

          echo "== Generated files in ${OUT_REL} =="
          ls -la "${OUT_REL}"
          echo
          echo "== build.config (first 200 lines) =="
          sed -n '1,200p' "${OUT_REL}/build.config"

      - name: Build kernel (build.sh)
        shell: bash
        run: |
          set -Eeuo pipefail
          set -x

          # Match your local build script intent
          export ARCH=arm64
          export PLATFORM_VERSION=13
          export CROSS_COMPILE="aarch64-linux-gnu-"
          export CROSS_COMPILE_COMPAT="arm-linux-gnueabi-"

          # Your tree defaults HERMETIC_TOOLCHAIN=1 in build.config.common.
          # For Ubuntu-hosted cross toolchains, disable hermetic mode.
          export HERMETIC_TOOLCHAIN=0

          # These are already in GITHUB_ENV from "Compute output paths"
          export OUT_DIR
          export DIST_DIR
          export BUILD_CONFIG

          trap 'ec=$?; echo "::error::build.sh failed (exit=$ec) at line $LINENO: $BASH_COMMAND"; echo "----- tail of build.log -----"; tail -n 200 build.log 2>/dev/null || true; exit $ec' ERR

          # Run Android kernel build driver
          cd kernel
          ./build/build.sh

      - name: Collect key outputs (best-effort)
        shell: bash
        run: |
          set -euo pipefail
          echo "== Find common outputs under ${OUT_REL} =="
          find "${OUT_REL}" -maxdepth 5 -type f \( \
            -name "Image" -o -name "Image.gz" -o -name "Image.lz4" -o \
            -name "*.ko" -o \
            -name "Module.symvers" -o -name "System.map" -o -name ".config" \
          \) -print | sort || true

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-${{ inputs.product }}-${{ inputs.mode }}
          if-no-files-found: error
          path: |
            ${{ steps.vars.outputs.out_rel }}/build.config
            ${{ steps.vars.outputs.out_rel }}/build.config.*
            ${{ steps.vars.outputs.out_rel }}/kernel-*/arch/arm64/boot/Image*
            ${{ steps.vars.outputs.out_rel }}/kernel-*/arch/arm64/boot/dts/**/*.dtb
            ${{ steps.vars.outputs.out_rel }}/kernel-*/arch/arm64/boot/dts/**/*.dtbo
            ${{ steps.vars.outputs.out_rel }}/*.ko
            ${{ steps.vars.outputs.out_rel }}/**/*.ko
            ${{ steps.vars.outputs.out_rel }}/kernel-*/Module.symvers
            ${{ steps.vars.outputs.out_rel }}/kernel-*/System.map
            ${{ steps.vars.outputs.out_rel }}/kernel-*/.config